<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Volume Mixer</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div id="app">
  <!-- ── Title Bar ── -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-left">
      <svg class="tb-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="5.5" width="3.5" height="5" rx=".5" fill="#0078d7"/><path d="M4.5 5.5 L8.5 2 L8.5 14 L4.5 10.5Z" fill="#0078d7"/><path d="M10 5.5Q13 8 10 10.5" stroke="#0078d7" stroke-width="1.2" fill="none" stroke-linecap="round"/><path d="M11.5 4Q15.5 8 11.5 12" stroke="#0078d7" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
      <span>Volume Mixer</span>
    </div>
    <div class="titlebar-btns">
      <button class="tb-btn" id="btn-help" title="Help">?</button>
      <button class="tb-btn tb-close" title="Close" onclick="window.close()">✕</button>
    </div>
  </div>

  <!-- ── Toolbar row ── -->
  <div class="toolbar">
    <div class="toolbar-device" id="toolbar-device">
      <svg viewBox="0 0 14 14" fill="none" width="14" height="14"><rect x=".5" y="4" width="3" height="6" rx=".4" fill="#555"/><path d="M3.5 4L7.5 1v12L3.5 10Z" fill="#555"/><path d="M9 4.5Q11.5 7 9 9.5" stroke="#555" stroke-width="1.1" stroke-linecap="round" fill="none"/></svg>
      <span id="device-name-toolbar">Default Device</span>
    </div>
    <button class="toolbar-refresh" id="btn-refresh" title="Refresh">↻ Refresh</button>
  </div>

  <!-- ── Mixer panel ── -->
  <div class="mixer-panel">
    <div class="mixer-scroll" id="mixer-scroll">

      <!-- ── Device section ── -->
      <div class="section">
        <div class="section-label">Device</div>
        <div class="channels-row" id="device-row">
          <div class="loading-msg"><div class="spinner"></div>Reading audio devices…</div>
        </div>
      </div>

      <div class="panel-divider"></div>

      <!-- ── Applications section ── -->
      <div class="section">
        <div class="section-label">Applications</div>
        <div class="channels-row" id="apps-row">
          <!-- populated by JS -->
        </div>
      </div>

    </div>
  </div>

  <!-- ── Status bar ── -->
  <div class="statusbar" id="statusbar">Ready</div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
